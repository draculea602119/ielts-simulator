<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 — IELTS Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #faf7f2;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #28786a;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.65rem 2rem;
      border: 2px solid #28786a;
      border-radius: 8px;
      color: #28786a;
      font-weight: 600;
      font-size: 0.95rem;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .retry-btn:hover {
      background: #28786a;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F4F6;</div>
    <h1>You're Offline</h1>
    <p>当前无法连接网络。已缓存的内容（如小说、词典查询）仍可使用。需要联网的功能（登录、考试提交、AI 口语/写作评分）将在恢复网络后可用。</p>
    <button class="retry-btn" onclick="location.reload()">重试连接</button>
  </div>
</body>
</html>
